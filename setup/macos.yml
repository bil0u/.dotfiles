# - WARNING - PARSER SEEMS TO HAVE A PROBLEM WITH 's' AT END OF LINES
#
# - SYNTAX -
#
#   name:    package name
#   exists:  command to run to know if the package is installed
#   install: commands to run to install the package
#   steps:   number of commands in 'install' category
#   update:  command to update the package , 'false' if none
#
#   RESPECT THE INDENTATION !
#
--
modules:
    -
        name: 'XCode'
        exists: xcode-select -p
        install:
            - xcode-select --install
        steps: 1
        update: false
    -
        name: 'Homebrew'
        exists: which brew
        install:
            - bash brew_install/install
        steps: 1
        update: brew update
    -
        name: 'Powerline fonts'
        exists: false
        install:
            - bash fonts/powerline/install.sh
        steps: 1
        update: false
    -
        name: 'Oh-My-Zsh'
        exists: echo $ZSH | grep oh-my-zsh
        install:
            - chsh -s /bin/zsh
        steps: 1
        update: bash zsh/oh-my-zsh/tools/upgrade.sh
    -
--
brew:
    packages:
        - 'coreutils'
        - 'wget'
        - 'cmake'
        - 'zsh-completions'
        - 'node'
        - 'python'
    casks:
        - 'iterm2'
        - 'atom'
--
app_prefs:
    -
        name: 'iTerm'
        type: plist
        file: iterm/com.googlecode.iterm2.plist
    -
